<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUB Coffee Menu</title>
<style>
:root{--primary:#0F5A57;--primary-dark:#0A4341;--cream:#F3EBD7;--beige:#DCCFB4;}
body{font-family:Arial,sans-serif;background:var(--cream);margin:0}
header{background:var(--primary);color:var(--cream);text-align:center;padding:30px}
.container{padding:20px;max-width:1000px;margin:auto}
.card{background:#fff;border-radius:15px;padding:15px;margin:15px 0;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.btn{background:var(--primary);color:white;border:none;padding:10px 15px;border-radius:10px}
</style>
</head>
<body>
<header>
<h1>SUB Coffee</h1>
<p>QR Menu Demo</p>
</header>
<div class="container">
<div class="card"><h3>لاتيه</h3><p>3.50$</p><button class="btn">إضافة للسلة</button></div>
<div class="card"><h3>كابتشينو</h3><p>4.00$</p><button class="btn">إضافة للسلة</button></div>
<div class="card"><h3>إسبريسو</h3><p>2.50$</p><button class="btn">إضافة للسلة</button></div>
</div>
</body>
</html>
